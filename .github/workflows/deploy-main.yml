name: Deploy Main Branch

on:
  push:
    branches: [ main ]

concurrency:
  group: terraform-deploy
  cancel-in-progress: false

jobs:
  deploy-all:
    name: Full Deployment
    uses: ./.github/workflows/deploy-all-reusable.yml
    permissions:
      contents: read
      id-token: write
    with:
      deploy_infrastructure: true
      deploy_sites: 'all'
      environment: 'prod'
    secrets: inherit

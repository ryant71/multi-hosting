name: CI Tests

on:
  push:
    branches: [ main, 'feature/*' ]
  pull_request:
    branches: [ main ]

jobs:
  validate-infrastructure:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.5.7

    - name: Terraform Format Check
      run: |
        cd platform
        terraform fmt -check -diff=false

  validate-hiredgnu-net:
    name: Validate HiredGnu.net Site
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Validate Pelican Structure
      run: |
        cd sites/hiredgnu.net/src
        
        if [ -f "pelicanconf.py" ]; then
          echo "✓ pelicanconf.py exists"
        else
          echo "✗ pelicanconf.py missing"
          exit 1
        fi
        
        if [ -d "content" ]; then
          echo "✓ content directory exists"
        else
          echo "✗ content directory missing"
          exit 1
        fi

    - name: Test Pelican Build
      run: |
        cd sites/hiredgnu.net/src
        pip install pelican markdown
        make clean
        make html
        
        if [ -f "output/index.html" ]; then
          echo "✓ Pelican build successful"
        else
          echo "✗ Pelican build failed"
          exit 1
        fi

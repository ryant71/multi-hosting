name: Deploy Crowded.Spot Site

on:
  push:
    branches: [ main ]
    paths: [ 'sites/crowded.spot/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'sites/crowded.spot/**' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
        - prod

env:
  AWS_REGION: eu-central-1
  SITE_NAME: crowded.spot
  TF_VERSION: 1.5.7

concurrency:
  group: terraform-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Site
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write  # Required for OIDC
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Get Infrastructure Outputs
      id: infra
      run: |
        cd platform
        terraform init -input=false \
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
          -backend-config="key=multi-hosting/terraform.tfstate" \
          -backend-config="region=eu-central-1" \
          -backend-config="encrypt=true" \
          -backend-config="dynamodb_table=terraform-locks-multi-hosting"
        echo "s3_bucket=$(terraform output -raw s3_content_bucket_name)" >> $GITHUB_OUTPUT
        echo "cloudfront_distribution=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT

    - name: Validate Site Structure
      run: |
        cd sites/${{ env.SITE_NAME }}
        if [ ! -f "index.html" ]; then
          echo "Error: index.html not found"
          exit 1
        fi
        if [ ! -d "assets" ]; then
          echo "Warning: assets directory not found"
        fi

    - name: Deploy to S3
      run: |
        cd sites/${{ env.SITE_NAME }}
        
        # Sync files to S3
        aws s3 sync . "s3://${{ steps.infra.outputs.s3_bucket }}/${{ env.SITE_NAME }}/" \
          --exclude ".git/*" \
          --exclude "deploy.sh" \
          --exclude "*.md" \
          --delete
        
        echo "✓ Files synced to S3 successfully"

    - name: Invalidate CloudFront Cache
      if: steps.infra.outputs.cloudfront_distribution != ''
      run: |
        INVALIDATION_ID=$(aws cloudfront create-invalidation \
          --distribution-id "${{ steps.infra.outputs.cloudfront_distribution }}" \
          --paths "/${{ env.SITE_NAME }}/*" \
          --query 'Invalidation.Id' \
          --output text)
        
        echo "✓ CloudFront cache invalidation created (ID: ${INVALIDATION_ID})"
        
        # Wait for invalidation to complete
        aws cloudfront wait invalidation-completed \
          --distribution-id "${{ steps.infra.outputs.cloudfront_distribution }}" \
          --id "${INVALIDATION_ID}"

    - name: Verify Deployment
      run: |
        # Check if files exist in S3
        echo "Verifying deployment..."
        
        if aws s3 ls "s3://${{ steps.infra.outputs.s3_bucket }}/${{ env.SITE_NAME }}/index.html" > /dev/null 2>&1; then
          echo "✓ index.html found in S3"
        else
          echo "✗ index.html not found in S3"
          exit 1
        fi
        
        echo "✓ Deployment verification completed"

    - name: Deployment Summary
      run: |
        echo "🚀 Site deployed successfully!"
        echo "📍 Site: ${{ env.SITE_NAME }}"
        echo "🌐 URL: https://${{ env.SITE_NAME }}"
        echo "📦 S3 Bucket: ${{ steps.infra.outputs.s3_bucket }}"
        echo "☁️ CloudFront Distribution: ${{ steps.infra.outputs.cloudfront_distribution }}"

  preview:
    name: Preview Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Show Changes
      run: |
        echo "Changes to be deployed for ${{ env.SITE_NAME }}:"
        echo ""
        git diff --name-only origin/main HEAD -- sites/${{ env.SITE_NAME }}/
        echo ""
        echo "Files that will be uploaded to S3:"
        find sites/${{ env.SITE_NAME }}/ -type f ! -path '*/.git/*' ! -name 'deploy.sh' ! -name '*.md' | sort

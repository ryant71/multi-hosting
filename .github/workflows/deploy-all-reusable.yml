name: Reusable Deploy All

on:
  workflow_call:
    inputs:
      deploy_infrastructure:
        description: 'Deploy infrastructure changes'
        required: false
        type: boolean
        default: true
      deploy_sites:
        description: 'Sites to deploy (all, crowded.spot, hiredgnu.net, clicken.click, or comma-separated)'
        required: false
        type: string
        default: 'all'
      environment:
        description: 'Environment to deploy to'
        required: false
        type: string
        default: 'prod'

env:
  AWS_REGION: eu-central-1
  TF_VERSION: 1.5.7

jobs:
  infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    if: inputs.deploy_infrastructure
    permissions:
      contents: read
      id-token: write  # Required for OIDC
    
    outputs:
      s3_bucket: ${{ steps.outputs.outputs.s3_bucket }}
      cloudfront_distribution: ${{ steps.outputs.outputs.cloudfront_distribution }}
      certificate_arn: ${{ steps.outputs.outputs.certificate_arn }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Terraform Init
      run: |
        cd platform
        terraform init -input=false \
          -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
          -backend-config="key=multi-hosting/terraform.tfstate" \
          -backend-config="region=eu-central-1" \
          -backend-config="encrypt=true" \
          -backend-config="dynamodb_table=terraform-locks-multi-hosting"

    - name: Terraform Plan
      run: |
        cd platform
        terraform plan -input=false -out=tfplan

    - name: Terraform Apply
      run: |
        cd platform
        terraform apply -input=false -auto-approve tfplan

    - name: Get Outputs
      id: outputs
      run: |
        cd platform
        echo "s3_bucket=$(terraform output -raw s3_content_bucket_name)" >> $GITHUB_OUTPUT
        echo "cloudfront_distribution=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
        echo "certificate_arn=$(terraform output -raw certificate_arn)" >> $GITHUB_OUTPUT

  deploy-crowded-spot:
    name: Deploy Crowded.Spot
    runs-on: ubuntu-latest
    needs: infrastructure
    if: inputs.deploy_sites == 'all' || contains(inputs.deploy_sites, 'crowded.spot')
    permissions:
      contents: read
      id-token: write  # Required for OIDC
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Fetch submodules
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
      run: |
        git config submodule.sites/crowded.spot.url "https://x-access-token:${GH_PAT}@github.com/ryant71/crowded.spot.git"
        git submodule update --init sites/crowded.spot

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Deploy Crowded.Spot
      env:
        S3_BUCKET: ${{ needs.infrastructure.outputs.s3_bucket }}
        DISTRIBUTION_ID: ${{ needs.infrastructure.outputs.cloudfront_distribution }}
      run: |
        cd sites/crowded.spot
        ./deploy.sh

    - name: Invalidate CloudFront
      run: |
        aws cloudfront create-invalidation \
          --distribution-id "${{ needs.infrastructure.outputs.cloudfront_distribution }}" \
          --paths "/crowded.spot/*"

  deploy-clicken-click:
    name: Deploy Clicken.Click
    runs-on: ubuntu-latest
    needs: infrastructure
    if: inputs.deploy_sites == 'all' || contains(inputs.deploy_sites, 'clicken.click')
    permissions:
      contents: read
      id-token: write  # Required for OIDC
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Deploy Clicken.Click
      env:
        S3_BUCKET: ${{ needs.infrastructure.outputs.s3_bucket }}
        DISTRIBUTION_ID: ${{ needs.infrastructure.outputs.cloudfront_distribution }}
      run: |
        cd sites/clicken.click
        ./deploy.sh

    - name: Invalidate CloudFront
      run: |
        aws cloudfront create-invalidation \
          --distribution-id "${{ needs.infrastructure.outputs.cloudfront_distribution }}" \
          --paths "/clicken.click/*"

  deploy-hiredgnu-net:
    name: Deploy HiredGnu.net
    runs-on: ubuntu-latest
    needs: infrastructure
    if: inputs.deploy_sites == 'all' || contains(inputs.deploy_sites, 'hiredgnu.net')
    permissions:
      contents: read
      id-token: write  # Required for OIDC
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Deploy HiredGnu.net
      env:
        S3_BUCKET: ${{ needs.infrastructure.outputs.s3_bucket }}
        DISTRIBUTION_ID: ${{ needs.infrastructure.outputs.cloudfront_distribution }}
      run: |
        cd sites/hiredgnu.net
        ./deploy.sh

    - name: Invalidate CloudFront
      run: |
        aws cloudfront create-invalidation \
          --distribution-id "${{ needs.infrastructure.outputs.cloudfront_distribution }}" \
          --paths "/hiredgnu.net/*"

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [infrastructure, deploy-crowded-spot, deploy-clicken-click, deploy-hiredgnu-net]
    if: always()
    
    steps:
    - name: Print Summary
      run: |
        echo "🚀 Multi-site deployment completed!"
        echo ""
        echo "Infrastructure: ${{ needs.infrastructure.result }}"
        echo "Crowded.Spot: ${{ needs.deploy-crowded-spot.result }}"
        echo "Clicken.Click: ${{ needs.deploy-clicken-click.result }}"
        echo "Hiredgnu.net: ${{ needs.deploy-hiredgnu-net.result }}"
        echo ""
        if [ "${{ needs.infrastructure.result }}" == "success" ]; then
          echo "📦 S3 Bucket: ${{ needs.infrastructure.outputs.s3_bucket }}"
          echo "☁️ CloudFront: ${{ needs.infrastructure.outputs.cloudfront_distribution }}"
        fi
        echo ""
        echo "🌐 Sites available at:"
        echo "  - https://crowded.spot"
        echo "  - https://clicken.click"
        echo "  - https://hiredgnu.net"

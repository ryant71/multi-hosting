name: Deploy Infrastructure

on:
  push:
    branches: [ main, develop ]
    paths: [ 'platform/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'platform/**' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - prod

env:
  AWS_REGION: eu-central-1
  TF_VERSION: 1.5.7

jobs:
  terraform:
    name: Terraform Plan/Apply
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write  # Required for OIDC

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Create Backend Config
      run: |
        cd platform
        cat > backend.tf <<EOF
        terraform {
          backend "s3" {
            bucket         = "${{ secrets.TF_STATE_BUCKET }}"
            key            = "multi-hosting/terraform.tfstate"
            region         = "eu-central-1"
            encrypt        = true
            use_lockfile   = true
          }
        }
        EOF

    - name: Terraform Format
      run: |
        cd platform
        terraform fmt -write=true

    - name: Terraform Format Check
      run: |
        cd platform
        terraform fmt -check -diff=false

    - name: Terraform Init
      run: |
        cd platform
        terraform init -input=false

    - name: Terraform Validate
      run: |
        cd platform
        terraform validate

    - name: Terraform Plan
      run: |
        cd platform
        terraform plan -input=false -out=tfplan

    - name: Terraform Plan Summary
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          const plan = fs.readFileSync('platform/tfplan', 'utf8');
          console.log('Terraform plan completed');
          console.log('Plan output available in workflow logs');

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        cd platform
        terraform apply -input=false -auto-approve tfplan

    - name: Terraform Apply (Manual)
      if: github.event_name == 'workflow_dispatch'
      run: |
        cd platform
        terraform apply -input=false -auto-approve tfplan

    - name: Upload Terraform Plan
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: terraform-plan
        path: platform/tfplan
        retention-days: 30

    - name: Get Terraform Outputs
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      id: terraform-outputs
      run: |
        cd platform
        echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT
        echo "cloudfront_distribution=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
        echo "certificate_arn=$(terraform output -raw certificate_arn)" >> $GITHUB_OUTPUT

    - name: Update Environment Variables
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/github-script@v7
      with:
        script: |
          const outputs = {
            S3_BUCKET: '${{ steps.terraform-outputs.outputs.s3_bucket }}',
            CLOUDFRONT_DISTRIBUTION: '${{ steps.terraform-outputs.outputs.cloudfront_distribution }}',
            CERTIFICATE_ARN: '${{ steps.terraform-outputs.outputs.certificate_arn }}'
          };
          
          console.log('Infrastructure deployed successfully!');
          console.log('S3 Bucket:', outputs.S3_BUCKET);
          console.log('CloudFront Distribution:', outputs.CLOUDFRONT_DISTRIBUTION);
          console.log('Certificate ARN:', outputs.CERTIFICATE_ARN);
